name: Deploy to Raspberry Pi k3s

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: web
            image: ghcr.io/ericjypark/bookmarket-v2-web
            dockerfile: apps/web/Dockerfile
          - service: api
            image: ghcr.io/ericjypark/bookmarket-v2-api
            dockerfile: services/api/Dockerfile
          - service: metadata-worker
            image: ghcr.io/ericjypark/bookmarket-v2-metadata-worker
            dockerfile: services/metadata-worker/Dockerfile

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/arm64
          push: true
          tags: |
            ${{ matrix.image }}:${{ github.sha }}
            ${{ matrix.image }}:latest
          build-args: |
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID || secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
            NEXT_PUBLIC_GITHUB_CLIENT_ID=${{ vars.NEXT_PUBLIC_GITHUB_CLIENT_ID || secrets.NEXT_PUBLIC_GITHUB_CLIENT_ID }}
            NEXT_PUBLIC_GITHUB_REDIRECT_URI=${{ vars.NEXT_PUBLIC_GITHUB_REDIRECT_URI || secrets.NEXT_PUBLIC_GITHUB_REDIRECT_URI }}

  deploy:
    name: Roll out k3s deployments
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy to Raspberry Pi k3s
        uses: appleboy/ssh-action@v1.2.5
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TAG: ${{ github.sha }}
          METADATA_WORKER_HOST_RESOLVE_OVERRIDES: ${{ vars.METADATA_WORKER_HOST_RESOLVE_OVERRIDES || secrets.METADATA_WORKER_HOST_RESOLVE_OVERRIDES }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          command_timeout: 15m
          envs: GHCR_TOKEN,GHCR_USER,GHCR_TAG,METADATA_WORKER_HOST_RESOLVE_OVERRIDES
          script: |
            set -eu

            if command -v kubectl >/dev/null 2>&1 && kubectl -n bookmarket get deploy/web >/dev/null 2>&1; then
              KUBECTL="kubectl"
            elif command -v k3s >/dev/null 2>&1; then
              KUBECTL="sudo k3s kubectl"
            else
              echo "kubectl or k3s kubectl is required on the Raspberry Pi"
              exit 1
            fi

            $KUBECTL -n bookmarket create secret docker-registry ghcr-pull \
              --docker-server=ghcr.io \
              --docker-username="$GHCR_USER" \
              --docker-password="$GHCR_TOKEN" \
              --dry-run=client -o yaml | $KUBECTL apply -f -
            $KUBECTL -n bookmarket patch serviceaccount default --type=merge \
              -p '{"imagePullSecrets":[{"name":"ghcr-pull"}]}'

            if [ -n "${METADATA_WORKER_HOST_RESOLVE_OVERRIDES:-}" ]; then
              $KUBECTL -n bookmarket set env deployment/metadata-worker \
                METADATA_WORKER_HOST_RESOLVE_OVERRIDES="$METADATA_WORKER_HOST_RESOLVE_OVERRIDES"
            fi

            $KUBECTL -n bookmarket set image deployment/web \
              web="ghcr.io/ericjypark/bookmarket-v2-web:${GHCR_TAG}"
            $KUBECTL -n bookmarket set image deployment/api \
              api="ghcr.io/ericjypark/bookmarket-v2-api:${GHCR_TAG}"
            $KUBECTL -n bookmarket set image deployment/metadata-worker \
              metadata-worker="ghcr.io/ericjypark/bookmarket-v2-metadata-worker:${GHCR_TAG}"

            $KUBECTL -n bookmarket rollout status deployment/web --timeout=5m
            $KUBECTL -n bookmarket rollout status deployment/api --timeout=5m
            $KUBECTL -n bookmarket rollout status deployment/metadata-worker --timeout=5m
